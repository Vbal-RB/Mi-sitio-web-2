<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67 - Movimiento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .numero {
            font-size: 300px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            animation: movimientoIzquierda 2s infinite ease-in-out;
            position: absolute;
            left: 10%;
        }

        .numero.derecha {
            left: auto;
            right: 10%;
            animation: movimientoDerecha 2s infinite ease-in-out;
        }

        @keyframes movimientoIzquierda {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(100px);
            }
            100% {
                transform: translateY(0);
            }
        }

        @keyframes movimientoDerecha {
            0% {
                transform: translateY(100px);
            }
            50% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(100px);
            }
        }
    </style>
</head>
<body>
    <div class="numero">6</div>
    <div class="numero derecha">7</div>
</body>
</html>
